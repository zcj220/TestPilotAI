<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopAdmin - 电商后台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 登录页 -->
<div id="loginPage" class="page active">
  <div class="login-box">
    <h1>🛒 ShopAdmin</h1>
    <p class="sub">电商后台管理系统</p>
    <div class="field"><label>用户名</label><input id="loginUser" type="text" placeholder="admin"></div>
    <div class="field"><label>密码</label><input id="loginPass" type="password" placeholder="123456"></div>
    <div id="loginError" class="err" style="display:none"></div>
    <button id="loginBtn" onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- 主页面 -->
<div id="mainPage" class="page">
  <aside class="sidebar">
    <div class="logo">ShopAdmin</div>
    <ul>
      <li id="nav-dashboard" class="nav active" onclick="showTab('dashboard')">📊 仪表盘</li>
      <li id="nav-products"  class="nav"        onclick="showTab('products')">📦 商品管理</li>
      <li id="nav-orders"    class="nav"        onclick="showTab('orders')">📋 订单管理</li>
      <li id="nav-users"     class="nav"        onclick="showTab('users')">👥 用户管理</li>
    </ul>
    <div id="logoutBtn" onclick="doLogout()">退出登录</div>
  </aside>

  <main class="content">
    <!-- 仪表盘 -->
    <div id="tab-dashboard" class="tab active">
      <h2>仪表盘</h2>
      <div class="stats">
        <div class="stat"><div id="stat-sales"    class="num">¥0</div><div class="lbl">今日销售额</div></div>
        <div class="stat"><div id="stat-orders"   class="num">0</div><div class="lbl">今日订单数</div></div>
        <div class="stat"><div id="stat-products" class="num">0</div><div class="lbl">商品总数</div></div>
        <div class="stat"><div id="stat-users"    class="num">0</div><div class="lbl">注册用户</div></div>
      </div>
      <h3>最近订单</h3>
      <table><thead><tr><th>订单号</th><th>用户</th><th>金额</th><th>状态</th></tr></thead>
        <tbody id="recentBody"></tbody>
      </table>
    </div>

    <!-- 商品管理 -->
    <div id="tab-products" class="tab">
      <h2>商品管理</h2>
      <div class="toolbar">
        <button id="addProductBtn" onclick="toggleAddForm()">+ 新增商品</button>
        <input id="searchInput" type="text" placeholder="搜索商品名称..." oninput="filterProducts()">
      </div>
      <div id="addForm" class="card" style="display:none">
        <h3>新增商品</h3>
        <div class="row">
          <div class="field"><label>商品名称</label><input id="pName" type="text"></div>
          <div class="field"><label>价格(元)</label><input id="pPrice" type="number" step="0.01"></div>
          <div class="field"><label>库存</label><input id="pStock" type="number"></div>
          <div class="field"><label>分类</label>
            <select id="pCat">
              <option value="">请选择分类</option>
              <option value="电子">电子产品</option>
              <option value="服装">服装</option>
              <option value="食品">食品</option>
              <option value="图书">图书</option>
            </select>
          </div>
        </div>
        <div id="pErr" class="err" style="display:none"></div>
        <button id="saveProductBtn" onclick="saveProduct()">保 存</button>
        <button onclick="toggleAddForm()">取 消</button>
      </div>
      <table id="productTable">
        <thead><tr><th>ID</th><th>名称</th><th>价格</th><th>库存</th><th>分类</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="productBody"></tbody>
      </table>
      <div id="productEmpty" class="empty">暂无商品，请点击"新增商品"</div>
    </div>

    <!-- 订单管理 -->
    <div id="tab-orders" class="tab">
      <h2>订单管理</h2>
      <div class="toolbar">
        <select id="orderFilter" onchange="filterOrders()">
          <option value="all">全部状态</option>
          <option value="待付款">待付款</option>
          <option value="已付款">已付款</option>
          <option value="已发货">已发货</option>
          <option value="已完成">已完成</option>
        </select>
      </div>
      <table>
        <thead><tr><th>订单号</th><th>用户</th><th>商品</th><th>数量</th><th>金额</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="orderBody"></tbody>
      </table>
      <div id="orderEmpty" class="empty">暂无订单</div>
      <div id="orderTotal">筛选订单合计：<strong id="orderTotalAmt">¥0.00</strong></div>
    </div>

    <!-- 用户管理 -->
    <div id="tab-users" class="tab">
      <h2>用户管理</h2>
      <table>
        <thead><tr><th>ID</th><th>用户名</th><th>邮箱</th><th>注册时间</th><th>状态</th></tr></thead>
        <tbody id="userBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
