# TestPilot AI — 生产部署配置（v13.1 MySQL 外部数据库版）
#
# 启动：docker compose up -d
# 查看：docker compose logs -f
# 停止：docker compose down
# 重建：docker compose up -d --build
#
# 首次部署：
#   1. cp .env.example .env
#   2. 编辑 .env 填入 MySQL 连接信息和密钥
#   3. docker compose up -d

services:
  # ── API 后端 ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?请在 .env 中设置 DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?请在 .env 中设置 JWT_SECRET_KEY}
      TP_AI_API_KEY: ${TP_AI_API_KEY:-}
      TP_AI_API_BASE_URL: ${TP_AI_API_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      TP_AI_MODEL: ${TP_AI_MODEL:-doubao-seed-1-8-251228}
      TP_SERVER_HOST: "0.0.0.0"
      TP_SERVER_PORT: "8900"
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-}
    ports:
      - "127.0.0.1:8900:8900"
    volumes:
      - api_data:/app/data

  # ── Web 前端 ───────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  api_data:
