# TestPilot AI — 生产部署配置
#
# 启动：docker compose up -d
# 查看：docker compose logs -f
# 停止：docker compose down
# 重建：docker compose up -d --build
#
# 首次部署需要：
#   1. cp .env.example .env
#   2. 编辑 .env 填入真实密钥
#   3. docker compose up -d
#   4. docker compose exec api python -m alembic upgrade head

services:
  # ── PostgreSQL 数据库 ──────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: testpilot
      POSTGRES_USER: testpilot
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请在 .env 中设置 DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API 后端 ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://testpilot:${DB_PASSWORD}@db:5432/testpilot
      JWT_SECRET_KEY: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      TP_AI_API_KEY: ${TP_AI_API_KEY:-}
      TP_AI_API_BASE_URL: ${TP_AI_API_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      TP_AI_MODEL: ${TP_AI_MODEL:-doubao-seed-1-8-251228}
      TP_SERVER_HOST: "0.0.0.0"
      TP_SERVER_PORT: "8900"
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-}
    ports:
      - "127.0.0.1:8900:8900"
    volumes:
      - api_data:/app/data

  # ── Web 前端 ───────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
  api_data:
